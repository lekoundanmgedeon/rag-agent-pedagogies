# Reverse proxy : SSL, rate limiting, en-têtes adaptés au streaming SSE (API)
# et au WebSocket (Streamlit). Certificats attendus dans ./certs/ (voir
# scripts/setup.sh pour générer un certificat auto-signé de test, ou monter de
# vrais certificats Let's Encrypt en production).

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # --- Rate limiting (défense en profondeur, en plus de slowapi côté API) ---
    limit_req_zone $binary_remote_addr zone=chat_zone:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=upload_zone:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=general_zone:10m rate=120r/m;

    upstream api_backend {
        server api:8000;
    }

    upstream frontend_backend {
        server frontend:8501;
    }

    # --- Redirection HTTP -> HTTPS ---
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 30m;  # cohérent avec MAX_FILE_SIZE_MB (défaut 25 Mo + marge)

        # --- API : streaming SSE (/api/chat) — surtout ne pas bufferiser ---
        location /api/chat {
            limit_req zone=chat_zone burst=5 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 300s;
            proxy_set_header Connection "";
        }

        location /api/upload {
            limit_req zone=upload_zone burst=3 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /api/documents {
            # Couvre aussi /api/documents/{id}/status (SSE) : pas de buffering.
            limit_req zone=general_zone burst=20 nodelay;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_set_header Connection "";
        }

        location /api/ {
            limit_req zone=general_zone burst=20 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        # --- Frontend Streamlit : nécessite le support WebSocket (rechargement live) ---
        location / {
            proxy_pass http://frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;  # WebSocket longue durée
        }
    }
}
