name: agent-tuteur-senegal

# Production : services internes (postgres/redis/qdrant/api/worker) non exposés
# sur l'hôte — seul nginx publie 80/443. Toutes les valeurs sensibles viennent
# d'un fichier .env (docker compose --env-file .env.prod -f docker-compose.prod.yml ...)
# SANS défaut : une variable manquante doit faire échouer le démarrage plutôt
# que de retomber silencieusement sur un secret de dev.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:?POSTGRES_SUPERUSER requis}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:?POSTGRES_SUPERUSER_PASSWORD requis}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB requis}
      # Lus par postgres-init/01-app-role.sh (rôle applicatif non-superuser).
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:?POSTGRES_APP_USER requis}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:?POSTGRES_APP_PASSWORD requis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER:?}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD requis}"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY requis}
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: ../agent-tuteur-api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_SUPERUSER:?}:${POSTGRES_SUPERUSER_PASSWORD:?}@postgres:5432/${POSTGRES_DB:?}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: ../agent-tuteur-api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_APP_USER:?POSTGRES_APP_USER requis}:${POSTGRES_APP_PASSWORD:?POSTGRES_APP_PASSWORD requis}@postgres:5432/${POSTGRES_DB:?}
      REDIS_URL: redis://:${REDIS_PASSWORD:?}@redis:6379/0
      VECTOR_BACKEND: qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:?}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-light}
      LLM_BACKEND: auto
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:?MISTRAL_API_KEY requis (ou vide si Ollama seul assumé)}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS requis (domaines autorisés, jamais * en prod)}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET requis}
      DEFAULT_TENANT: ${DEFAULT_TENANT:-default}
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  worker:
    build: ../agent-tuteur-api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_APP_USER:?}:${POSTGRES_APP_PASSWORD:?}@postgres:5432/${POSTGRES_DB:?}
      REDIS_URL: redis://:${REDIS_PASSWORD:?}@redis:6379/0
      VECTOR_BACKEND: qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:?}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-light}
    command: ["arq", "agent_tuteur.workers.ingestion_worker.WorkerSettings"]
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    # Plusieurs workers : `docker compose -f docker-compose.prod.yml up --scale worker=3 -d`

  frontend:
    build: ../agent-tuteur-frontend
    environment:
      API_BASE_URL: http://api:8000
      DEFAULT_TENANT: ${DEFAULT_TENANT:-default}
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
