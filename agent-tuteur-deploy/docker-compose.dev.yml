name: agent-tuteur-senegal

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tuteur
      POSTGRES_PASSWORD: tuteur
      POSTGRES_DB: tuteur
      # Lus par postgres-init/01-app-role.sh pour créer le rôle applicatif
      # non-superuser (nécessaire pour que RLS s'applique réellement).
      POSTGRES_APP_USER: tuteur_app
      POSTGRES_APP_PASSWORD: tuteur_app_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    # Pas d'exposition sur l'hôte : évite tout conflit avec un Postgres déjà
    # installé sur la machine (port 5432). Les services y accèdent en interne via
    # le nom `postgres`. Pour déboguer depuis l'hôte, ajouter un override avec
    # `ports: ["55432:5432"]`.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuteur"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # Pas d'exposition sur l'hôte (évite un conflit avec un Redis local sur 6379).
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: ../agent-tuteur-api
    environment:
      # Rôle SUPERUSER : seul capable de CREATE TABLE / CREATE POLICY / ENABLE RLS.
      DATABASE_URL: postgresql+asyncpg://tuteur:tuteur@postgres:5432/tuteur
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: ../agent-tuteur-api
    # Source unique de vérité pour la config applicative (clés LLM, etc.) :
    # ce fichier est relu à chaque `up -d`, pas besoin de --build en cas de changement.
    env_file:
      - ../agent-tuteur-api/.env
    environment:
      # Ces valeurs sont spécifiques au réseau Docker et priment sur env_file :
      # elles remplacent volontairement les URL "localhost" du .env local.
      # Rôle applicatif NON-superuser : condition pour que RLS s'applique réellement.
      DATABASE_URL: postgresql+asyncpg://tuteur_app:tuteur_app_password@postgres:5432/tuteur
      REDIS_URL: redis://redis:6379/0
      VECTOR_BACKEND: qdrant
      QDRANT_URL: http://qdrant:6333
      EMBEDDING_BACKEND: light
      LLM_BACKEND: auto
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  worker:
    build: ../agent-tuteur-api
    environment:
      DATABASE_URL: postgresql+asyncpg://tuteur_app:tuteur_app_password@postgres:5432/tuteur
      REDIS_URL: redis://redis:6379/0
      VECTOR_BACKEND: qdrant
      QDRANT_URL: http://qdrant:6333
      EMBEDDING_BACKEND: light
    command: ["arq", "agent_tuteur.workers.ingestion_worker.WorkerSettings"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # Frontend web (Vue 3) : sert le SPA et proxifie /api + /health vers l'API.
  # UI accessible sur http://localhost:8080
  web:
    build: ../agent-tuteur-web
    ports:
      - "8080:80"
    depends_on:
      - api

  # Amorçage d'un compte admin, exécuté à chaque `up` (idempotent : ne fait rien
  # si le compte existe déjà). Sans lui, personne ne pourrait se connecter.
  # Identifiants par défaut (dev) : admin@tuteur.sn / changeme123 — surchargeables
  # via ADMIN_EMAIL / ADMIN_PASSWORD.
  createadmin:
    build: ../agent-tuteur-api
    environment:
      DATABASE_URL: postgresql+asyncpg://tuteur_app:tuteur_app_password@postgres:5432/tuteur
    command:
      - python
      - scripts/create_user.py
      - --email
      - ${ADMIN_EMAIL:-admin@tuteur.sn}
      - --password
      - ${ADMIN_PASSWORD:-changeme123}
      - --role
      - admin
      - --tenant
      - ${DEFAULT_TENANT:-default}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

volumes:
  postgres_data:
  qdrant_data:
