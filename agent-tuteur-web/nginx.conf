# Config nginx de l'image web : sert le SPA Vue et proxifie l'API.
# `api` est le nom du service API dans le réseau docker-compose (dev et prod).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 30m;  # cohérent avec MAX_FILE_SIZE_MB (25 Mo + marge)

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # --- API : streaming SSE (/api/chat) — ne pas bufferiser ---
    location /api/chat {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Couvre aussi /api/documents/{id}/status (SSE) : pas de buffering.
    location /api/documents {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    # --- SPA : toute autre route retombe sur index.html (routeur côté client) ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
